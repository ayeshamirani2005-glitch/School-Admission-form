<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
    <link rel="stylesheet" href="admistyle.css">
</head>
<body>
   
         <form action="#" method="post">
        <div class="box">
            <h1>SCHOOL ADMISSION FORM</h1> 
            <h3>Personal information</h3>
             <label for="name">Name</label>
            <input type="text" id="name" placeholder="Full name" required>
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
            <input type="file" id="file" class="file">
            <label  for="file" class="picture">Student picture</label>
            <label for="gender">Gender</label>
             <div class="radio-group">
            <label> <input type="radio" name="gender" value="male">Male</label>
            <label> <input type="radio" name="gender" value="female">Female</label>
            
            </div> 

                <label for="parent name">Parent/Guardian Name</label>
                <input type="text" id="parent name" required>
                <label for="email"> Parent Email</label>
                <input type="email" id="email" required>
                <label for="pno"> Parent phone</label>
                <input type="number" id="pno" required>
            
                 <h3>Academic Information</h3>
                <label for="Institue">Current Institue</label>
                <input type="text" id="Institue" name="Institue" placeholder="Institue Name">

                <label for="grade"> Current Grade</label>
                <select class="select" name="" id="">
                    <option value="">Select Grade</option>
                    <option value="Grade 9">Grade 9</option>
                    <option value="Grade 10">Grade 10</option>
                    <option value="Grade 11">Grade 11</option>
                    <option value="Grade 12">Grade 12</option>
                </select>
                    
                 <h3>Address Information</h3>
             <label for="addrees"> Residential Address</label>
            <input type="text" id="addrees">
            <label for="city">City</label>
            <input type="text" id="city" >
            <button type="submit">Submit Application</button>
        </div>
    </form>
    
    
</body>
</html>
