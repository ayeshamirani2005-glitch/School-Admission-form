<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission Form</title>
    <link rel="stylesheet" href="admistyle.css">
</head>
<body>

    <form action="#" method="post">
        <div class="box">
            <h1>SCHOOL ADMISSION FORM</h1>

            <h3>Personal Information</h3>
            
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Full name" required>

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" required>

            <label for="file" class="picture">Student Picture</label>
            <input type="file" id="file" name="student_pic" class="file">

            <label>Gender</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>

            <label for="parent_name">Parent/Guardian Name</label>
            <input type="text" id="parent_name" name="parent_name" required>

            <label for="email">Parent Email</label>
            <input type="email" id="email" name="parent_email" required>

            <label for="pno">Parent Phone</label>
            <input type="tel" id="pno" name="parent_phone" required>

            <h3>Academic Information</h3>
            
            <label for="institute">Current Institute</label>
            <input type="text" id="institute" name="institute" placeholder="Institute Name">

            <label for="grade">Current Grade</label>
            <select class="select" name="grade" id="grade">
                <option value="">Select Grade</option>
                <option value="Grade 9">Grade 9</option>
                <option value="Grade 10">Grade 10</option>
                <option value="Grade 11">Grade 11</option>
                <option value="Grade 12">Grade 12</option>
            </select>

            <h3>Address Information</h3>
            
            <label for="address">Residential Address</label>
            <input type="text" id="address" name="address">

            <label for="city">City</label>
            <input type="text" id="city" name="city">

            <button type="submit">Submit Application</button>
        </div>
    </form>

</body>
</html>
